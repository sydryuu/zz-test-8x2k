<style>
:root{
  --ink:#0F0D0E;        /* 深墨底 */
  --ink-2:#17141500;
  --cream:#F7F3EC;      /* 暖米白卡片 */
  --gold:#C9A961;       /* 金色月亮 */
  --gold-soft:#E2C988;
  --wine:#4A0F14;       /* 酒红 CTA */
  --wine-2:#6E1A22;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Noto Serif SC","Noto Serif CJK SC","Source Han Serif SC","Songti SC","STSong",serif;
  background:var(--ink);
  color:var(--cream);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* 背景：深墨 + 顶部月光辉光 */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(201,169,97,.18) 0%, rgba(201,169,97,.05) 28%, rgba(15,13,14,0) 55%),
    radial-gradient(100% 120% at 50% 120%, rgba(74,15,20,.45) 0%, rgba(15,13,14,0) 60%),
    var(--ink);
}
.stars{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none;}

.wrap{
  position:relative;z-index:1;
  min-height:100%;
  max-width:480px;margin:0 auto;
  padding:env(safe-area-inset-top) 22px env(safe-area-inset-bottom);
  display:flex;flex-direction:column;
}

/* ===== 通用屏幕切换 ===== */
.screen{
  display:none;
  flex:1;flex-direction:column;
  padding:24px 0 36px;
  opacity:0;transform:translateY(18px);
  transition:opacity .5s ease,transform .5s ease;
}
.screen.active{display:flex;}
.screen.shown{opacity:1;transform:translateY(0);}

/* ===== 月亮 ===== */
.moon-stage{display:flex;justify-content:center;align-items:center;}
.moon-svg{filter:drop-shadow(0 0 22px rgba(201,169,97,.45));}

/* ===== 封面 ===== */
#cover{justify-content:center;text-align:center;align-items:center;}
.cover-moon{margin-bottom:10px;}
.kicker{
  font-size:13px;letter-spacing:.42em;color:var(--gold);
  text-transform:uppercase;margin-bottom:18px;padding-left:.42em;
  font-family:"Spectral","Noto Serif SC",serif;font-style:italic;
}
.cover h1{
  font-size:42px;font-weight:600;line-height:1.18;letter-spacing:.04em;
  margin-bottom:6px;
  background:linear-gradient(180deg,#fff 0%,var(--gold-soft) 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.cover .sub{font-size:16px;color:rgba(247,243,236,.7);letter-spacing:.2em;margin-bottom:30px;}
.cover .desc{
  font-size:15px;line-height:1.9;color:rgba(247,243,236,.62);
  max-width:300px;margin:0 auto 38px;
}
.divider{width:46px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 30px;}

/* 品牌字标 + 五种粮金点 + slogan */
.brandmark{
  font-size:15px;letter-spacing:.12em;color:var(--gold);padding-left:.12em;
  margin-bottom:16px;font-weight:600;
  text-shadow:0 0 16px rgba(201,169,97,.5);
}
.grains{display:flex;justify-content:center;align-items:center;gap:9px;margin:0 auto 26px;}
.grains i{
  width:6px;height:8px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));
  transform:rotate(-8deg);box-shadow:0 0 6px rgba(201,169,97,.4);
  display:inline-block;
}
.grains i:nth-child(2){transform:rotate(6deg);}
.grains i:nth-child(4){transform:rotate(6deg);}
.grains i:nth-child(3){transform:rotate(-3deg) scale(1.08);}
.cover-slogan{
  margin-top:24px;font-size:14px;letter-spacing:.34em;padding-left:.34em;
  color:rgba(201,169,97,.85);
}

/* ===== 按钮 ===== */
.btn{
  display:inline-block;border:none;cursor:pointer;
  font-family:inherit;font-size:17px;font-weight:600;letter-spacing:.16em;
  color:var(--cream);
  background:linear-gradient(135deg,var(--wine-2),var(--wine));
  padding:16px 46px;border-radius:40px;
  box-shadow:0 10px 30px rgba(74,15,20,.55),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease;
}
.btn:active{transform:scale(.97);}
.btn::after{
  content:"";position:absolute;inset:0;border-radius:40px;
  border:1px solid rgba(201,169,97,.45);
}
.btn-ghost{
  background:transparent;color:var(--gold);box-shadow:none;
  border:1px solid rgba(201,169,97,.4);padding:13px 34px;font-size:15px;
}
.btn-ghost::after{display:none;}

/* ===== 答题区 ===== */
.q-head{display:flex;flex-direction:column;align-items:center;margin-bottom:6px;}
.q-moon{margin-bottom:8px;}
.q-counter{font-size:13px;letter-spacing:.3em;color:var(--gold);font-family:"Spectral",serif;font-style:italic;}
.q-axis{font-size:12px;letter-spacing:.34em;color:rgba(247,243,236,.4);margin-top:4px;}

.q-body{flex:1;display:flex;flex-direction:column;justify-content:center;}
.q-stem{
  font-size:25px;font-weight:600;line-height:1.5;letter-spacing:.02em;
  text-align:center;margin:8px 4px 34px;
  color:#fff;
}
.opt{
  display:block;width:100%;text-align:left;cursor:pointer;
  font-family:inherit;font-size:17px;line-height:1.6;letter-spacing:.02em;
  color:var(--ink);
  background:var(--cream);
  border:none;border-radius:18px;
  padding:20px 22px;margin-bottom:16px;
  position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
}
.opt:active{transform:scale(.985);}
.opt.pick{background:var(--gold);box-shadow:0 8px 26px rgba(201,169,97,.5);}
.opt .tag{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;
  background:var(--wine);color:var(--cream);
  font-size:14px;font-weight:600;margin-right:12px;vertical-align:-5px;
  font-family:"Spectral",serif;
}
.opt.pick .tag{background:var(--ink);color:var(--gold);}

/* 题目过渡 */
.q-fade{transition:opacity .32s ease,transform .32s ease;}
.q-fade.out{opacity:0;transform:translateY(-14px);}
.q-fade.in-prep{opacity:0;transform:translateY(16px);}

/* ===== 结果卡 ===== */
#result{padding-top:14px;}
.result-head{text-align:center;margin-bottom:18px;}
.result-head .hint{font-size:12px;letter-spacing:.3em;color:rgba(247,243,236,.5);}

.card{
  background:
    radial-gradient(130% 60% at 50% 0%, rgba(201,169,97,.14), rgba(247,243,236,0) 60%),
    var(--cream);
  color:var(--ink);
  border-radius:24px;
  padding:34px 28px 30px;
  position:relative;overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  border:1px solid rgba(201,169,97,.5);
}
.card::before{ /* 角部弧线 motif */
  content:"";position:absolute;top:-60px;right:-60px;width:150px;height:150px;
  border:1px solid rgba(201,169,97,.5);border-radius:50%;
}
.card::after{
  content:"";position:absolute;bottom:-70px;left:-70px;width:170px;height:170px;
  border:1px solid rgba(74,15,20,.18);border-radius:50%;
}
.card-brand{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  margin-bottom:8px;
}
.card-brand span{
  font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--wine);
}
.card-brand em{
  font-style:normal;font-size:11px;letter-spacing:.24em;color:rgba(15,13,14,.45);
  padding-left:.24em;
}
.card-moon{display:flex;justify-content:center;margin-bottom:6px;}
.avatar-svg{filter:drop-shadow(0 8px 16px rgba(74,15,20,.22));}
.card-grains{display:flex;justify-content:center;gap:8px;margin:16px auto 12px;}
.card-grains i{
  width:5px;height:7px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;
  background:var(--gold);transform:rotate(-8deg);display:inline-block;
}
.card-grains i:nth-child(2),.card-grains i:nth-child(4){transform:rotate(6deg);}
.card-grains i:nth-child(3){transform:scale(1.1);}
.card-code{
  text-align:center;font-family:"Spectral",serif;font-style:italic;
  letter-spacing:.42em;font-size:14px;color:var(--gold);
  padding-left:.42em;margin-bottom:8px;
}
.card-name{
  text-align:center;font-size:34px;font-weight:700;letter-spacing:.04em;
  color:var(--wine);line-height:1.2;margin-bottom:4px;
}
.card-axes{text-align:center;font-size:12px;letter-spacing:.16em;color:rgba(15,13,14,.5);margin-bottom:22px;}
.sec{margin-bottom:20px;}
.sec-label{
  font-size:11px;letter-spacing:.34em;color:var(--gold);
  border-left:3px solid var(--gold);padding-left:10px;margin-bottom:9px;
  font-weight:600;
}
.sec-text{font-size:16px;line-height:1.85;color:rgba(15,13,14,.86);padding-left:13px;}
.lock{
  margin-top:24px;text-align:center;
  font-size:18px;font-weight:600;line-height:1.6;color:var(--wine);
  padding:18px 10px 4px;
  border-top:1px solid rgba(201,169,97,.45);
}
.lock .small{display:block;font-size:13px;color:rgba(15,13,14,.45);letter-spacing:.3em;margin-top:14px;font-weight:400;}

.result-actions{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:26px;}
.share-tip{font-size:13px;color:rgba(247,243,236,.55);letter-spacing:.1em;text-align:center;line-height:1.7;}

/* 保存结果图 浮层 */
.save-overlay{
  position:fixed;inset:0;z-index:50;display:none;
  background:rgba(8,7,7,.92);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:24px 16px 36px;
}
.save-overlay.show{display:block;}
.save-inner{max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px;}
.save-hint{

  margin-top:4px;
}
.save-hint b{color:#fff;font-weight:600;}
#saveImg{
  width:100%;height:auto;border-radius:18px;
  box-shadow:0 16px 50px rgba(0,0,0,.6);
  display:block;
}
.save-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.save-actions a,.save-actions button{text-decoration:none;}

@media (max-height:680px){
  .cover h1{font-size:36px;}
  .q-stem{font-size:22px;margin-bottom:26px;}
}
</style>
</head>

<script>
/* ============== 数据 ============== */
/* 12 题升级版（每维3题·每题4选项，程度档计分：强=±2 / 弱=±1）。opts 顺序 = A/B/C/D */
var QUESTIONS = [
  { axis:"张罗 / 安坐", stem:"一桌人刚坐下，气氛还有点僵，你通常会——", opts:[
    {t:"立马起身招呼大家落座、张罗倒酒上菜", v:"D", p:2},
    {t:"主动找话头打破沉默，但不抢着张罗", v:"D", p:1},
    {t:"等有人起头，我再顺着搭把手", v:"C", p:1},
    {t:"安静坐着，看大家怎么安排", v:"C", p:2} ]},
  { axis:"张罗 / 安坐", stem:"席间需要有人点菜/续茶/招呼服务员，你——", opts:[
    {t:"基本都是我在张罗，眼观六路", v:"D", p:2},
    {t:"我会主动管一两样，比如点菜", v:"D", p:1},
    {t:"别人忙不过来时我才搭手", v:"C", p:1},
    {t:"一般等主人或张罗的人来弄", v:"C", p:2} ]},
  { axis:"张罗 / 安坐", stem:"饭局散场要结账、安排送人，你多半——", opts:[
    {t:"我来拍板，买单、叫车一手安排", v:"D", p:2},
    {t:"我会提议怎么弄，但听大家意见", v:"D", p:1},
    {t:"跟着大家的决定走，帮忙递个话", v:"C", p:1},
    {t:"默默等结果，让张罗的人定", v:"C", p:2} ]},
  { axis:"健言 / 善听", stem:"轮到你说几句/敬酒，你——", opts:[
    {t:"张口就来，想到啥说啥图个痛快", v:"B", p:2},
    {t:"简单几句真心话，不绕弯", v:"B", p:1},
    {t:"会斟酌一下，照顾在场的人", v:"T", p:1},
    {t:"字斟句酌，确保谁都不被冷落", v:"T", p:2} ]},
  { axis:"健言 / 善听", stem:"桌上有人观点你不认同，你会——", opts:[
    {t:"当场直说，有啥讲啥", v:"B", p:2},
    {t:"委婉表达不同意，但也说出来", v:"B", p:1},
    {t:"点到为止，不让场面尴尬", v:"T", p:1},
    {t:"先不说，换个私下场合再聊", v:"T", p:2} ]},
  { axis:"健言 / 善听", stem:"有人在桌上讲了个冷场的话，你——", opts:[
    {t:"直接调侃回去，逗大家笑", v:"B", p:2},
    {t:"接一句活跃下气氛", v:"B", p:1},
    {t:"默默打个圆场把话题带开", v:"T", p:1},
    {t:"不动声色照顾那人情绪，悄悄转移", v:"T", p:2} ]},
  { axis:"敬人 / 自品", stem:"一场饭局下来，你最在意的是——", opts:[
    {t:"每个人有没有被照顾到、聊得开不开心", v:"E", p:2},
    {t:"重要的人是不是敬到了、感受好", v:"E", p:1},
    {t:"这顿饭该办的事办成了没", v:"S", p:1},
    {t:"整桌局面顺不顺、有没有掉链子", v:"S", p:2} ]},
  { axis:"敬人 / 自品", stem:"席间有人闹了点小别扭，你——", opts:[
    {t:"心里一直惦记，非得找机会缓和不可", v:"E", p:2},
    {t:"会留意，找个台阶让双方下", v:"E", p:1},
    {t:"小事，先把整桌气氛稳住要紧", v:"S", p:1},
    {t:"不掺和情绪，顾好大局就行", v:"S", p:2} ]},
  { axis:"敬人 / 自品", stem:"安排座位时你优先考虑——", opts:[
    {t:"谁和谁投缘、聊得来，让大家舒服", v:"E", p:2},
    {t:"让重要的人坐得受尊重又自在", v:"E", p:1},
    {t:"按辈分职位排，不出错", v:"S", p:1},
    {t:"怎么坐有利于把事谈成", v:"S", p:2} ]},
  { axis:"念旧 / 尝新", stem:"说到酒桌规矩，你觉得——", opts:[
    {t:"长幼有序、先敬长辈，老规矩必须守", v:"H", p:2},
    {t:"基本规矩还是要讲的", v:"H", p:1},
    {t:"看场合，熟人之间随意点没事", v:"N", p:1},
    {t:"规矩是死的人是活的，开心最重要", v:"N", p:2} ]},
  { axis:"念旧 / 尝新", stem:"让你组个局，你会选——", opts:[
    {t:"有年代感的老馆子，按老路子来", v:"H", p:2},
    {t:"稳妥经典的地方，大家都熟", v:"H", p:1},
    {t:"偶尔试试新店、新玩法", v:"N", p:1},
    {t:"整点新花样，露营、围炉、密室都行", v:"N", p:2} ]},
  { axis:"念旧 / 尝新", stem:"敬酒的方式，你倾向——", opts:[
    {t:"该走的流程一个不少，郑重其事", v:"H", p:2},
    {t:"照老礼来，但不必太拘谨", v:"H", p:1},
    {t:"简化一下，意思到了就行", v:"N", p:1},
    {t:"自创新玩法，碰个杯说句俏皮话", v:"N", p:2} ]}

/* ============== 月相 SVG ============== */
/* progress 0..1：弯月 → 满月。金色月面 + 背景色阴影盘偏移露出。 */
function moonSVG(size, progress){
  var r = size*0.40, cx = size/2, cy = size/2;
  // 阴影盘从几乎全覆盖(细弯月) → 完全移开(满月)
  var off = (0.10 + 0.90*progress) * (2*r);
  var id = "g"+Math.round(progress*1000)+"_"+size;
  return ''+
  '<svg class="moon-svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<defs>'+
      '<radialGradient id="face'+id+'" cx="42%" cy="38%" r="70%">'+
        '<stop offset="0%" stop-color="#F4E4BC"/>'+
        '<stop offset="55%" stop-color="#C9A961"/>'+
        '<stop offset="100%" stop-color="#A8893F"/>'+
      '</radialGradient>'+
      '<clipPath id="clip'+id+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'"/></clipPath>'+
    '</defs>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r+2)+'" fill="none" stroke="rgba(201,169,97,.25)" stroke-width="1"/>'+
    '<g clip-path="url(#clip'+id+')">'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#face'+id+')"/>'+
      '<circle cx="'+(cx - off)+'" cy="'+(cy-r*0.12)+'" r="'+r+'" fill="#0F0D0E"/>'+
    '</g>'+
  '</svg>';
}

var CLOTH = {
  DBEH:'#6E1A22', DBEN:'#28384B', DBSH:'#5A3320', DBSN:'#43293F',
  DTEH:'#244035', DTEN:'#8A5A33', DTSH:'#34424E', DTSN:'#9A4A2A',

};

function avatarSVG(code, size){
  var p = code.split('');
  var dAx=p[0], tAx=p[1], eAx=p[2], hAx=p[3];
  var cloth = CLOTH[code] || '#4A0F14';
  var skin='#F1D3A9', hair='#2A2018', gold='#C9A961', goldL='#F0E0B0', goldD='#A8893F', wine='#4A0F14';
  var uid = code;

  // 五粮特曲金杯
  function cup(cx,cy,sc){
    sc = sc||1;
    var w=10*sc, bh=13*sc, st=9*sc;
    return ''+
    '<path d="M'+(cx-w)+','+cy+' L'+(cx+w)+','+cy+' L'+(cx+w*0.62)+','+(cy+bh)+' Q'+cx+','+(cy+bh+3*sc)+' '+(cx-w*0.62)+','+(cy+bh)+' Z" fill="url(#cupg'+uid+')" stroke="'+goldD+'" stroke-width="1"/>'+
    '<path d="M'+(cx-w*0.78)+','+(cy+3*sc)+' Q'+cx+','+(cy+8*sc)+' '+(cx+w*0.78)+','+(cy+3*sc)+'" fill="none" stroke="'+wine+'" stroke-width="'+(2.4*sc)+'" stroke-linecap="round" opacity=".8"/>'+
    '<rect x="'+(cx-1.4*sc)+'" y="'+(cy+bh)+'" width="'+(2.8*sc)+'" height="'+(st*0.7)+'" fill="'+goldD+'"/>'+
    '<ellipse cx="'+cx+'" cy="'+(cy+bh+st*0.7)+'" rx="'+(7*sc)+'" ry="'+(2.2*sc)+'" fill="'+gold+'"/>'+
    '<circle cx="'+(cx-w*0.35)+'" cy="'+(cy+3*sc)+'" r="'+(1.6*sc)+'" fill="#fff" opacity=".85"/>';
  }

  var s = '<svg xmlns="http://www.w3.org/2000/svg" class="avatar-svg" width="'+size+'" height="'+size+'" viewBox="0 0 200 200">';
  s += '<defs><linearGradient id="cupg'+uid+'" x1="0" y1="0" x2="0" y2="1">'+
       '<stop offset="0" stop-color="'+goldL+'"/><stop offset="1" stop-color="'+goldD+'"/></linearGradient></defs>';

  // 背景圆盘 + 金环（深底/米白卡上都能托住）
  s += '<circle cx="100" cy="100" r="93" fill="rgba(247,243,236,0.05)"/>';
  s += '<circle cx="100" cy="100" r="93" fill="none" stroke="'+gold+'" stroke-width="1.4" opacity=".45"/>';

  // 肩/身
  s += '<path d="M40,172 Q44,122 100,120 Q156,122 160,172 Z" fill="'+cloth+'"/>';
  // 领口（H 立领盘扣 / N 现代圆领）
  if(hAx==='H'){
    s += '<path d="M88,122 L88,150 Q100,158 112,150 L112,122 Z" fill="'+cloth+'" stroke="'+gold+'" stroke-width="2"/>';
    s += '<circle cx="100" cy="134" r="2.6" fill="'+gold+'"/><circle cx="100" cy="146" r="2.6" fill="'+gold+'"/>';
  } else {
    s += '<path d="M84,121 Q100,140 116,121" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="3"/>';
  }
  // 脖子 + 耳 + 头
  s += '<rect x="92" y="104" width="16" height="18" rx="6" fill="'+skin+'"/>';
  s += '<circle cx="64" cy="84" r="6" fill="'+skin+'"/><circle cx="136" cy="84" r="6" fill="'+skin+'"/>';
  s += '<circle cx="100" cy="80" r="36" fill="'+skin+'"/>';
  // 头发
  s += '<path d="M62,72 Q60,40 100,38 Q140,40 138,72 Q120,56 100,56 Q80,56 62,72 Z" fill="'+hair+'"/>';
  if(hAx==='N'){ // 现代刘海
    s += '<path d="M60,68 Q92,46 140,66 Q112,52 60,68 Z" fill="'+hair+'"/>';
  }
  // 眼睛（E 笑眼 / S 沉静圆眼）
  if(eAx==='E'){
    s += '<path d="M82,80 Q89,72 96,80" fill="none" stroke="'+hair+'" stroke-width="3.6" stroke-linecap="round"/>';
    s += '<path d="M104,80 Q111,72 118,80" fill="none" stroke="'+hair+'" stroke-width="3.6" stroke-linecap="round"/>';
  } else {
    s += '<circle cx="90" cy="82" r="3.8" fill="'+hair+'"/><circle cx="110" cy="82" r="3.8" fill="'+hair+'"/>';
    s += '<circle cx="91.2" cy="83.2" r="1.1" fill="#fff" opacity=".8"/><circle cx="111.2" cy="83.2" r="1.1" fill="#fff" opacity=".8"/>';
  }
  // 腮红（敬人 E 更明显）
  s += '<ellipse cx="76" cy="92" rx="8" ry="5" fill="#D87A6E" opacity="'+(eAx==='E'?0.55:0.26)+'"/>';
  s += '<ellipse cx="124" cy="92" rx="8" ry="5" fill="#D87A6E" opacity="'+(eAx==='E'?0.55:0.26)+'"/>';
  // 嘴（B 张嘴说笑 / T 抿嘴微笑）
  if(tAx==='B'){
    s += '<ellipse cx="100" cy="98" rx="6.5" ry="8" fill="#8A2A28"/>';
    s += '<ellipse cx="100" cy="101" rx="3.6" ry="2.6" fill="#D86A66"/>';
  } else {
    s += '<path d="M90,97 Q100,105 110,97" fill="none" stroke="#7A3A36" stroke-width="3.4" stroke-linecap="round"/>';
  }
  // 头饰（H 瓜皮小帽 / N 圆框眼镜）
  if(hAx==='H'){
    s += '<path d="M62,60 Q100,24 138,60 Q100,46 62,60 Z" fill="'+wine+'"/>';
    s += '<path d="M62,60 Q100,46 138,60" fill="none" stroke="'+gold+'" stroke-width="3"/>';
    s += '<circle cx="100" cy="33" r="5.5" fill="'+gold+'"/>';
  } else {
    s += '<circle cx="90" cy="81" r="12" fill="none" stroke="'+goldD+'" stroke-width="2.4"/>';
    s += '<circle cx="110" cy="81" r="12" fill="none" stroke="'+goldD+'" stroke-width="2.4"/>';
    s += '<line x1="102" y1="81" x2="98" y2="81" stroke="'+goldD+'" stroke-width="2.4"/>';
  }

  // 手 + 杯（D 举杯招呼 / C 双手捧杯安坐）
  if(dAx==='D'){
    s += '<path d="M150,168 Q174,130 156,94" fill="none" stroke="'+cloth+'" stroke-width="17" stroke-linecap="round"/>';
    s += '<circle cx="156" cy="92" r="9" fill="'+skin+'"/>';
    s += cup(156, 66, 0.95);
  } else {
    s += cup(100, 144, 1.05);
    s += '<circle cx="85" cy="152" r="9" fill="'+skin+'"/><circle cx="115" cy="152" r="9" fill="'+skin+'"/>';
  }

  s += '</svg>';
  return s;
}

/* 头像的原生 canvas 版本（与 avatarSVG 同款，用于保存图片，iOS/微信稳定）*/
function drawAvatar(ctx, code, ox, oy, size){
  var p=code.split(''); var dAx=p[0],tAx=p[1],eAx=p[2],hAx=p[3];
  var cloth=CLOTH[code]||'#4A0F14';
  var skin='#F1D3A9',hair='#2A2018',gold='#C9A961',goldL='#F0E0B0',goldD='#A8893F',wine='#4A0F14';
  ctx.save(); ctx.translate(ox,oy); ctx.scale(size/200,size/200); ctx.lineJoin='round';

  function circle(cx,cy,r,fill,strokeC,lw,alpha){
    ctx.globalAlpha=alpha==null?1:alpha; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(strokeC){ctx.lineWidth=lw;ctx.strokeStyle=strokeC;ctx.stroke();}
    ctx.globalAlpha=1;
  }
  function ellipse(cx,cy,rx,ry,fill,alpha){
    ctx.globalAlpha=alpha==null?1:alpha; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
    ctx.fillStyle=fill; ctx.fill(); ctx.globalAlpha=1;
  }
  function rrect(x,y,w,h,r,fill){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); }
  function cup(cx,cy,sc){
    var w=10*sc,bh=13*sc,st=9*sc;
    var g=ctx.createLinearGradient(cx,cy,cx,cy+bh); g.addColorStop(0,goldL); g.addColorStop(1,goldD);
    ctx.beginPath(); ctx.moveTo(cx-w,cy); ctx.lineTo(cx+w,cy); ctx.lineTo(cx+w*0.62,cy+bh); ctx.quadraticCurveTo(cx,cy+bh+3*sc,cx-w*0.62,cy+bh); ctx.closePath();
    ctx.fillStyle=g; ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle=goldD; ctx.stroke();
    ctx.globalAlpha=.8; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(cx-w*0.78,cy+3*sc); ctx.quadraticCurveTo(cx,cy+8*sc,cx+w*0.78,cy+3*sc); ctx.lineWidth=2.4*sc; ctx.strokeStyle=wine; ctx.stroke(); ctx.lineCap='butt'; ctx.globalAlpha=1;
    ctx.fillStyle=goldD; ctx.fillRect(cx-1.4*sc, cy+bh, 2.8*sc, st*0.7);
    ellipse(cx, cy+bh+st*0.7, 7*sc, 2.2*sc, gold);
    circle(cx-w*0.35, cy+3*sc, 1.6*sc, '#fff', null, null, .85);
  }

  // 背景盘 + 金环
  circle(100,100,93,'rgba(247,243,236,0.05)');
  circle(100,100,93,null,gold,1.4,.45);
  // 肩
  ctx.beginPath(); ctx.moveTo(40,172); ctx.quadraticCurveTo(44,122,100,120); ctx.quadraticCurveTo(156,122,160,172); ctx.closePath(); ctx.fillStyle=cloth; ctx.fill();
  // 领口
  if(hAx==='H'){
    ctx.beginPath(); ctx.moveTo(88,122); ctx.lineTo(88,150); ctx.quadraticCurveTo(100,158,112,150); ctx.lineTo(112,122); ctx.closePath(); ctx.fillStyle=cloth; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=gold; ctx.stroke();
    circle(100,134,2.6,gold); circle(100,146,2.6,gold);
  } else {
    ctx.beginPath(); ctx.moveTo(84,121); ctx.quadraticCurveTo(100,140,116,121); ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.stroke();
  }
  // 脖子 + 耳 + 头
  rrect(92,104,16,18,6,skin);
  circle(64,84,6,skin); circle(136,84,6,skin); circle(100,80,36,skin);
  // 头发
  ctx.beginPath(); ctx.moveTo(62,72); ctx.quadraticCurveTo(60,40,100,38); ctx.quadraticCurveTo(140,40,138,72); ctx.quadraticCurveTo(120,56,100,56); ctx.quadraticCurveTo(80,56,62,72); ctx.closePath(); ctx.fillStyle=hair; ctx.fill();
  if(hAx==='N'){ ctx.beginPath(); ctx.moveTo(60,68); ctx.quadraticCurveTo(92,46,140,66); ctx.quadraticCurveTo(112,52,60,68); ctx.closePath(); ctx.fillStyle=hair; ctx.fill(); }
  // 眼
  if(eAx==='E'){
    ctx.strokeStyle=hair; ctx.lineWidth=3.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(82,80); ctx.quadraticCurveTo(89,72,96,80); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(104,80); ctx.quadraticCurveTo(111,72,118,80); ctx.stroke();
    ctx.lineCap='butt';
  } else {
    circle(90,82,3.8,hair); circle(110,82,3.8,hair);
    circle(91.2,83.2,1.1,'#fff',null,null,.8); circle(111.2,83.2,1.1,'#fff',null,null,.8);
  }
  // 腮红
  var ba=eAx==='E'?0.55:0.26;
  ellipse(76,92,8,5,'#D87A6E',ba); ellipse(124,92,8,5,'#D87A6E',ba);
  // 嘴
  if(tAx==='B'){ ellipse(100,98,6.5,8,'#8A2A28'); ellipse(100,101,3.6,2.6,'#D86A66'); }
  else { ctx.strokeStyle='#7A3A36'; ctx.lineWidth=3.4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(90,97); ctx.quadraticCurveTo(100,105,110,97); ctx.stroke(); ctx.lineCap='butt'; }
  // 头饰
  if(hAx==='H'){
    ctx.beginPath(); ctx.moveTo(62,60); ctx.quadraticCurveTo(100,24,138,60); ctx.quadraticCurveTo(100,46,62,60); ctx.closePath(); ctx.fillStyle=wine; ctx.fill();
    ctx.beginPath(); ctx.moveTo(62,60); ctx.quadraticCurveTo(100,46,138,60); ctx.lineWidth=3; ctx.strokeStyle=gold; ctx.stroke();
    circle(100,33,5.5,gold);
  } else {
    circle(90,81,12,null,goldD,2.4); circle(110,81,12,null,goldD,2.4);
    ctx.beginPath(); ctx.moveTo(102,81); ctx.lineTo(98,81); ctx.lineWidth=2.4; ctx.strokeStyle=goldD; ctx.stroke();
  }
  // 手 + 杯
  if(dAx==='D'){
    ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(150,168); ctx.quadraticCurveTo(174,130,156,94); ctx.lineWidth=17; ctx.strokeStyle=cloth; ctx.stroke(); ctx.lineCap='butt';
    circle(156,92,9,skin); cup(156,66,0.95);
  } else {
    cup(100,144,1.05); circle(85,152,9,skin); circle(115,152,9,skin);
  }
  ctx.restore();
}

var counts = {D:0,C:0,B:0,T:0,E:0,S:0,H:0,N:0};

/* ===== Umami 埋点（全程容错：未加载/出错都不影响 H5）===== */
var testStarted = false, testCompleted = false, abandonSent = false;
function tk(name, data){ try{ if(window.umami && umami.track) umami.track(name, data); }catch(e){} }
// 中途放弃：页面隐藏且已开始未完成时上报一次（含答到第几题）
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='hidden' && testStarted && !testCompleted && !abandonSent){
    abandonSent = true;
    tk('test_abandon', { at_question: idx+1 });
  }
});

var screens = {
  cover: document.getElementById('cover'),
  quiz: document.getElementById('quiz'),
  result: document.getElementById('result')
};

function show(name){
  Object.keys(screens).forEach(function(k){
    var el = screens[k];
    if(k===name){
      el.classList.add('active');
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('shown'); }); });
    }else{
      el.classList.remove('shown');
      el.classList.remove('active');
    }
  });
  window.scrollTo(0,0);
}

// 初始月亮 + 首屏淡入
document.getElementById('coverMoonStage').innerHTML = moonSVG(96, 1);
show('cover');

document.getElementById('startBtn').addEventListener('click', function(){
  idx = 0;
  counts = {D:0,C:0,B:0,T:0,E:0,S:0,H:0,N:0};
  testStarted = true; testCompleted = false; abandonSent = false;
  tk('test_start');
  show('quiz');
  renderQuestion(false);
});

var qFade = document.getElementById('qFade');
var locked = false; // 切题过渡期间锁住，防止连点多记分

function renderQuestion(animate){
  var q = QUESTIONS[idx];
  var draw = function(){
    document.getElementById('quizMoonStage').innerHTML = moonSVG(72, idx/QUESTIONS.length);
    document.getElementById('qCounter').textContent = pad(idx+1)+' / '+pad(QUESTIONS.length);
    document.getElementById('qAxis').textContent = q.axis;
    document.getElementById('qStem').textContent = q.stem;
    // 生成 4 个选项（A/B/C/D）
    var box = document.getElementById('qOpts');
    box.innerHTML = '';
    var TAGS = ['A','B','C','D'];
    q.opts.forEach(function(opt, i){
      var btn = document.createElement('button');
      btn.className = 'opt';
      btn.innerHTML = '<span class="tag">'+TAGS[i]+'</span><span class="opt-t"></span>';
      btn.querySelector('.opt-t').textContent = opt.t;
      btn.addEventListener('click', function(){ choose(opt, btn); });
      box.appendChild(btn);
    });
    locked = false; // 新题就绪，解锁
    // 进入动画
    qFade.classList.add('in-prep');
    requestAnimationFrame(function(){
      qFade.classList.remove('out');
      qFade.classList.remove('in-prep');
    });
  };
  if(animate){
    qFade.classList.add('out');
    setTimeout(draw, 320);
  }else{
    draw();
  }
}

function pad(n){ return n<10 ? '0'+n : ''+n; }

function choose(opt, el){
  if(locked) return; // 过渡期间锁住，防连点多记分
  locked = true;
  el.classList.add('pick');
  counts[opt.v] += opt.p;   // 程度档计分：强=2 / 弱=1
  setTimeout(function(){
    idx++;
    if(idx >= QUESTIONS.length){
      finish();
    }else{
      renderQuestion(true);
    }
  }, 260);
}

function finish(){
  // 平票取前者：D>C, B>T, E>S, H>N
  var code =
    (counts.D >= counts.C ? 'D':'C') +
    (counts.B >= counts.T ? 'B':'T') +
    (counts.E >= counts.S ? 'E':'S') +
    (counts.H >= counts.N ? 'H':'N');
  var t = TYPES[code];
  currentCode = code;   // 供"保存结果图"使用
  testCompleted = true;
  tk('test_complete', { type: t.name });   // 带型名 → 后台可看各型分布

  document.getElementById('cardMoonStage').innerHTML = avatarSVG(code, 168);
  document.getElementById('cardCode').textContent = code;
  document.getElementById('cardName').textContent = t.name;
  document.getElementById('cardAxes').textContent = t.axes;
  document.getElementById('cardPortrait').textContent = t.portrait;
  document.getElementById('cardMoment').textContent = t.moment;
  document.getElementById('cardLock').innerHTML =
    t.lock + '，<br>值得这更好的一杯。' +
    '<span class="grains card-grains"><i></i><i></i><i></i><i></i><i></i></span>' +
    '<span class="small">五 粮 成 酒 · 一 桌 成 圆</span>';

  show('result');
}

document.getElementById('retryBtn').addEventListener('click', function(){
  show('cover');
});

/* ============== 保存结果图（纯 canvas 手绘，无外部库，微信兼容）============== */
function renderResultCanvas(code, t){
  return new Promise(function(resolve){
    var S = Math.min(3, window.devicePixelRatio || 2); if(S < 2) S = 2;
    var W = 660, M = 20, PAD = 44;
    var cardX = M, cardW = W - 2*M;
    var contentX = cardX + PAD, contentW = cardW - 2*PAD;
    var INK='#0F0D0E', CREAM='#F7F3EC', GOLD='#C9A961', WINE='#4A0F14';
    var serif = "'Noto Serif SC','Songti SC','STSong',serif";
    var AV = 156, LH = 33, LOCKLH = 36;

    // 量字 / 折行（CJK 按字断行）
    var meas = document.createElement('canvas').getContext('2d');
    function wrap(text, font, maxW){
      meas.font = font;
      var lines=[], line='';
      for(var i=0;i<text.length;i++){
        var ch=text[i], test=line+ch;
        if(meas.measureText(test).width > maxW && line){ lines.push(line); line=ch; }
        else line=test;
      }
      if(line) lines.push(line);
      return lines;
    }
    var fText = "400 21px "+serif, fLock = "600 23px "+serif;
    var pLines = wrap(t.portrait, fText, contentW-14);
    var mLines = wrap(t.moment, fText, contentW-14);
    var lLines = [t.lock+'，', '值得这更好的一杯。'];  // 固定两行，与卡片一致，避免孤字

    // 收集绘制块（高度 + 画法），保证测高与绘制同步
    var ops=[], yy = M + PAD;
    function add(h, fn){ ops.push({y:yy, fn:fn}); yy += h; }

    function lsText(ctx, str, cx, y, ls, color, font, align){
      ctx.font=font; ctx.fillStyle=color; ctx.textAlign='left';
      var ws=[], total=0;
      for(var i=0;i<str.length;i++){ var w=ctx.measureText(str[i]).width; ws.push(w); total+=w+ls; }
      total-=ls;
      var sx = align==='center' ? cx-total/2 : cx;
      for(var i=0;i<str.length;i++){ ctx.fillText(str[i], sx, y); sx+=ws[i]+ls; }
      return total;
    }

    // 品牌头（slogan + 桌长十六型 两行）
    add(48, function(ctx,y){
      ctx.textAlign='center';
      ctx.font="700 16px "+serif; ctx.fillStyle=WINE;
      ctx.fillText('五粮特曲 · 更好的特曲给更好的你', W/2, y+16);
      lsText(ctx, '桌长十六型', W/2, y+35, 4, 'rgba(15,13,14,.45)', "400 12px "+serif, 'center');
    });
    // 头像（原生 canvas 手绘，微信/iOS 必现）
    add(AV+12, function(ctx,y){ drawAvatar(ctx, code, W/2-AV/2, y, AV); });
    // 代号
    add(28, function(ctx,y){ lsText(ctx, code, W/2, y+18, 7, GOLD, "italic 700 15px "+serif, 'center'); });
    // 型名
    add(50, function(ctx,y){ ctx.textAlign='center'; ctx.font="700 35px "+serif; ctx.fillStyle=WINE; ctx.fillText(t.name, W/2, y+34); });
    // 四轴
    add(24, function(ctx,y){ ctx.textAlign='center'; ctx.font="400 13px "+serif; ctx.fillStyle='rgba(15,13,14,.5)'; ctx.fillText(t.axes, W/2, y+14); });
    add(18, function(){});
    // 一句话画像
    add(24, function(ctx,y){ secLabel(ctx,'一句话画像',y); });
    add(pLines.length*LH+10, function(ctx,y){ textBlock(ctx,pLines,y); });
    // 标志性饭桌时刻
    add(24, function(ctx,y){ secLabel(ctx,'标志性饭桌时刻',y); });
    add(mLines.length*LH+12, function(ctx,y){ textBlock(ctx,mLines,y); });
    // 锁尾句
    add(20, function(ctx,y){ ctx.strokeStyle='rgba(201,169,97,.45)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(contentX,y+10); ctx.lineTo(contentX+contentW,y+10); ctx.stroke(); });
    add(lLines.length*LOCKLH+8, function(ctx,y){
      ctx.textAlign='center'; ctx.font="600 23px "+serif; ctx.fillStyle=WINE;
      for(var i=0;i<lLines.length;i++) ctx.fillText(lLines[i], W/2, y+24+i*LOCKLH);
    });
    // 五种粮金点
    add(22, function(ctx,y){
      var n=5, gw=10, cx0=W/2-((n-1)*gw)/2;
      for(var i=0;i<n;i++){ ctx.beginPath(); ctx.ellipse(cx0+i*gw, y+8, 2.6, 3.6, 0,0,Math.PI*2); ctx.fillStyle=GOLD; ctx.fill(); }
    });
    // 落款
    add(24, function(ctx,y){ lsText(ctx,'五粮成酒 · 一桌成圆', W/2, y+12, 5, 'rgba(15,13,14,.45)', "400 13px "+serif, 'center'); });

    function secLabel(ctx, text, y){
      ctx.fillStyle=GOLD; ctx.fillRect(contentX, y, 3, 16);
      lsText(ctx, text, contentX+12, y+13, 4, GOLD, "600 12px "+serif, 'left');
    }
    function textBlock(ctx, lines, y){
      ctx.textAlign='left'; ctx.font="400 21px "+serif; ctx.fillStyle='rgba(15,13,14,.86)';
      for(var i=0;i<lines.length;i++) ctx.fillText(lines[i], contentX+13, y+22+i*LH);
    }

    var cardBottom = yy + PAD, H = cardBottom + M;

    function paint(){
      var cv=document.createElement('canvas'); cv.width=W*S; cv.height=H*S;
      var ctx=cv.getContext('2d'); ctx.scale(S,S); ctx.textBaseline='alphabetic';
      // 深底 + 顶部金辉
      ctx.fillStyle=INK; ctx.fillRect(0,0,W,H);
      var rg=ctx.createRadialGradient(W/2,0,0,W/2,0,W*0.75);
      rg.addColorStop(0,'rgba(201,169,97,.16)'); rg.addColorStop(1,'rgba(15,13,14,0)');
      ctx.fillStyle=rg; ctx.fillRect(0,0,W,H*0.55);
      // 卡片
      function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
      rr(cardX, M, cardW, cardBottom-M, 26); ctx.fillStyle=CREAM; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle='rgba(201,169,97,.5)'; ctx.stroke();
      ctx.save(); rr(cardX,M,cardW,cardBottom-M,26); ctx.clip();
      ctx.beginPath(); ctx.arc(cardX+cardW, M, 80,0,Math.PI*2); ctx.lineWidth=1; ctx.strokeStyle='rgba(201,169,97,.45)'; ctx.stroke();
      ctx.beginPath(); ctx.arc(cardX, cardBottom, 90,0,Math.PI*2); ctx.strokeStyle='rgba(74,15,20,.16)'; ctx.stroke();
      ctx.restore();
      // 内容
      ops.forEach(function(o){ o.fn(ctx, o.y); });
      resolve(cv);
    }
    paint();   // 全程同步绘制，无需等待外部图片加载
  });
}

(function(){
  var saveBtn=document.getElementById('saveBtn'), overlay=document.getElementById('saveOverlay');
  var img=document.getElementById('saveImg'), dl=document.getElementById('saveDownload'), hint=document.getElementById('saveHint');
  var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints>0);
  saveBtn.addEventListener('click', function(){
    if(!currentCode) return;
    tk('share_click', { type: TYPES[currentCode].name });
    saveBtn.disabled=true; saveBtn.textContent='生 成 中…';
    renderResultCanvas(currentCode, TYPES[currentCode]).then(function(cv){
      var url=cv.toDataURL('image/png');
      img.src=url; dl.href=url;
      if(isTouch){
        // 手机：走"保存到相册"，藏掉会生成文件的下载按钮
        hint.innerHTML='👇 <b>长按下方图片</b> → 保存到相册<br><span style="font-size:13px;opacity:.72">再用微信「照片」发给朋友（别用「文件」发）</span>';
        dl.style.display='none';
      } else {
        hint.innerHTML='<b>右键图片</b> → 图片另存为<br><span style="font-size:13px;opacity:.72">发到群里时选「图片」，别选「文件」</span>';
        dl.style.display='';
      }
      overlay.classList.add('show');
      saveBtn.disabled=false; saveBtn.textContent='保 存 结 果 图 片';
    }).catch(function(){
      saveBtn.disabled=false; saveBtn.textContent='保 存 结 果 图 片';
      alert('生成失败了，可长按上方结果卡截图保存');
    });
  });
  document.getElementById('saveClose').addEventListener('click', function(){ overlay.classList.remove('show'); });
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.classList.remove('show'); });
})();

/* ============== 星空背景 ============== */
(function(){
  var c = document.getElementById('stars'), ctx = c.getContext('2d');
  var stars = [];
  function resize(){
    c.width = window.innerWidth; c.height = window.innerHeight;
    stars = [];
    var n = Math.min(70, Math.floor(c.width*c.height/14000));
    for(var i=0;i<n;i++){
      stars.push({ x:Math.random()*c.width, y:Math.random()*c.height*0.7,
        r:Math.random()*1.3+0.2, a:Math.random()*0.6+0.2, s:Math.random()*0.015+0.004, p:Math.random()*Math.PI*2 });
    }
  }
  function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var st = stars[i];
      st.p += st.s;
      var alpha = st.a * (0.55 + 0.45*Math.sin(st.p));
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(226,201,136,'+alpha.toFixed(3)+')';
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  resize();
  window.addEventListener('resize', resize);
  tick();
})();
</script>
